<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="700"
     viewBox="0 0 900 700">

  <defs>
    <radialGradient id="physicalNetwork" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#bdbdbd"/>
    </radialGradient>

    <linearGradient id="sales" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66B3FF"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>

    <linearGradient id="hr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81E6A6"/>
      <stop offset="100%" stop-color="#2E9E5B"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="8"
                    flood-color="#000000"
                    flood-opacity="0.25"/>
    </filter>
  </defs>


  <!-- Background -->
  <rect width="900" height="700" fill="white"/>


  <!-- Physical network -->
  <circle cx="450" cy="350" r="300"
          fill="url(#physicalNetwork)"
          stroke="#777"
          stroke-width="5"
          filter="url(#shadow)"/>


  <!-- VLAN Vendas -->
  <circle cx="330" cy="350" r="120"
          fill="url(#sales)"
          stroke="#1259A8"
          stroke-width="4"/>


  <!-- VLAN Recursos Humanos -->
  <circle cx="570" cy="350" r="120"
          fill="url(#hr)"
          stroke="#237A47"
          stroke-width="4"/>


  <!-- Computer icon function -->
  <g fill="white" stroke="#555" stroke-width="2">

    <!-- Vendas computers -->
    <rect x="270" y="285" width="35" height="25" rx="3"/>
    <rect x="350" y="285" width="35" height="25" rx="3"/>
    <rect x="310" y="405" width="35" height="25" rx="3"/>

    <!-- RH computers -->
    <rect x="510" y="285" width="35" height="25" rx="3"/>
    <rect x="590" y="285" width="35" height="25" rx="3"/>
    <rect x="550" y="405" width="35" height="25" rx="3"/>

  </g>


  <!-- Computer stands -->
  <g stroke="white" stroke-width="3">
    <line x1="287" y1="310" x2="287" y2="320"/>
    <line x1="367" y1="310" x2="367" y2="320"/>
    <line x1="327" y1="430" x2="327" y2="440"/>

    <line x1="527" y1="310" x2="527" y2="320"/>
    <line x1="607" y1="310" x2="607" y2="320"/>
    <line x1="567" y1="430" x2="567" y2="440"/>
  </g>


  <!-- Labels -->
  <text x="330" y="365"
        text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="28"
        font-weight="bold"
        fill="white">
    Vendas
  </text>


  <text x="570" y="355"
        text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="22"
        font-weight="bold"
        fill="white">
    Recursos
  </text>

  <text x="570" y="385"
        text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="22"
        font-weight="bold"
        fill="white">
    Humanos
  </text>


  <!-- Physical network label -->
  <text x="450" y="115"
        text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="26"
        font-weight="bold"
        fill="#555">
    Rede Física
  </text>

</svg>
